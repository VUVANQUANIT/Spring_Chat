services:
  postgres:
    image: postgres:15
    container_name: postgres_java_spring_chat_realtime
    environment:
      POSTGRES_DB: spring_chat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  rabbitmq:
    image: rabbitmq:3-management
    container_name: spring_chat_rabbitmq_prod
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
  redis:
    image: redis:7
    container_name: spring_chat_redis_prod
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server","--appendonly","yes"]
volumes:
  pgdata:
  redisdata:
