spring.application.name=Spring_chat

# Java 21 Virtual Threads (Project Loom) — massive concurrency improvement for WebSocket/chat
spring.threads.virtual.enabled=true

# Load local .env as properties (for development)
spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}

# JWT — explicit bindings to avoid relaxed-binding issues with multi-word env var keys
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Database - Production
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Timezone - Always use UTC for production
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JPA/Hibernate - Production Settings
# Dialect auto-detected by Hibernate 7 — no need to set explicitly
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Disable open-in-view to avoid DB queries leaking into view layer
spring.jpa.open-in-view=false

# Connection Pool - Production Optimized
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
