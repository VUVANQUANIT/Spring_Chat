spring.application.name=Spring_chat


spring.threads.virtual.enabled=true

# Load local .env as properties (for development)
spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Database - Production
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Timezone - Always use UTC for production
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JPA/Hibernate - Production Settings

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Disable open-in-view to avoid DB queries leaking into view layer
spring.jpa.open-in-view=false

# Connection Pool - Production Optimized
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# RabbitMQ - Messaging for Async Mail Sending
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Redis - In-memory Storage for OTP/Password Reset Tokens
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
